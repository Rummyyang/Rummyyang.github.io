<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>风车 V5 — HAWT 三维交互式审阅</title>
<style>
  body { margin: 0; overflow: hidden; background: #1a1f2e;
         font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Microsoft YaHei", sans-serif; }
  #c { display: block; }
  #info {
    position: absolute; top: 12px; left: 12px; color: #eee;
    background: rgba(0,0,0,0.55); padding: 12px 16px; border-radius: 8px;
    font-size: 13px; line-height: 1.7; max-width: 320px;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #info h1 { margin: 0 0 8px 0; font-size: 16px; color: #ffd76b; }
  #info table { border-collapse: collapse; margin-top: 6px; }
  #info td { padding: 2px 10px 2px 0; font-size: 12px; }
  #info td:first-child { color: #aaa; }
  #info td:last-child { color: #fff; }
  #info .new { color: #4fc3f7; font-weight: 600; }
  #ctrls {
    position: absolute; bottom: 14px; left: 12px; color: #eee;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 8px;
    font-size: 12px; line-height: 1.6;
    border: 1px solid rgba(255,255,255,0.1);
  }
  #ctrls button {
    background: #ffd76b; color: #1a1f2e; border: none;
    padding: 5px 12px; border-radius: 5px; cursor: pointer;
    font-weight: 600; margin: 4px 4px 0 0;
  }
  #ctrls button.off { background: rgba(255,255,255,0.18); color: #eee; }
  #legend {
    position: absolute; top: 12px; right: 12px; color: #eee;
    background: rgba(0,0,0,0.55); padding: 10px 14px; border-radius: 8px;
    font-size: 12px; line-height: 1.7;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .swatch { display: inline-block; width: 14px; height: 14px; border-radius: 3px;
            vertical-align: middle; margin-right: 6px; border: 1px solid rgba(0,0,0,0.3);}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="info">
  <h1>🌀 风车 V5 — HAWT 修正版</h1>
  <table>
    <tr><td>布局</td><td>水平轴（扇叶在竖直面）</td></tr>
    <tr><td>底座</td><td>3 × 100×100×2.5</td></tr>
    <tr><td>立柱</td><td class="new">实心方柱 40×60×250</td></tr>
    <tr><td>顶盖</td><td>60×40×2.5</td></tr>
    <tr><td>梯形支架</td><td>60→10, h=45, W=30 (空心)</td></tr>
    <tr><td>轴</td><td>∅10 钢轴</td></tr>
    <tr><td>轮毂法兰</td><td class="new">∅30 小法兰（替代∅60盘）</td></tr>
    <tr><td>扇叶</td><td class="new">六边形 + R3 圆角</td></tr>
    <tr><td>固定</td><td class="new">6 颗 ∅3 铆钉</td></tr>
    <tr><td>Pitch 角</td><td>20°</td></tr>
  </table>
</div>

<div id="legend">
  <div><span class="swatch" style="background:#a8b5c4;"></span>钢/铝板</div>
  <div><span class="swatch" style="background:#7a8aa0;"></span>实心方柱</div>
  <div><span class="swatch" style="background:#cf8a4a;"></span>梯形支架</div>
  <div><span class="swatch" style="background:#4a4a4a;"></span>钢轴 ∅10</div>
  <div><span class="swatch" style="background:#c0c0c0;"></span>轮毂法兰</div>
  <div><span class="swatch" style="background:#f0c674;"></span>扇叶 (×3)</div>
</div>

<div id="ctrls">
  🖱 <b>左键拖动</b> 旋转 · <b>滚轮</b> 缩放<br>
  <button id="b-spin">▶ 让风车转起来</button>
  <button id="b-reset" class="off">↺ 重置视角</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const canvas = document.getElementById('c');
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x1a1f2e);
scene.fog = new THREE.Fog(0x1a1f2e, 800, 1600);

const W = window.innerWidth, H = window.innerHeight;
const camera = new THREE.PerspectiveCamera(40, W / H, 1, 3000);

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(window.devicePixelRatio);
renderer.setSize(W, H);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

// Lighting
scene.add(new THREE.AmbientLight(0xffffff, 0.45));
const sun = new THREE.DirectionalLight(0xffffff, 0.9);
sun.position.set(200, 400, 250);
sun.castShadow = true;
sun.shadow.mapSize.width = 1024;
sun.shadow.mapSize.height = 1024;
sun.shadow.camera.left = -350; sun.shadow.camera.right = 350;
sun.shadow.camera.top = 450; sun.shadow.camera.bottom = -50;
sun.shadow.camera.near = 1; sun.shadow.camera.far = 1500;
scene.add(sun);

const fill = new THREE.DirectionalLight(0xaaccff, 0.25);
fill.position.set(-200, 100, -150);
scene.add(fill);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(800, 800),
  new THREE.MeshStandardMaterial({ color: 0x2a3142, roughness: 0.9 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

const grid = new THREE.GridHelper(700, 35, 0x444a5e, 0x333744);
grid.position.y = 0.1;
scene.add(grid);

// Materials
const matSteel = new THREE.MeshStandardMaterial({ color: 0xa8b5c4, roughness: 0.4, metalness: 0.7 });
const matSolidCol = new THREE.MeshStandardMaterial({ color: 0x7a8aa0, roughness: 0.5, metalness: 0.6 });
const matSteelDark = new THREE.MeshStandardMaterial({ color: 0x4a4a4a, roughness: 0.5, metalness: 0.8 });
const matTrap = new THREE.MeshStandardMaterial({ color: 0xcf8a4a, roughness: 0.5, metalness: 0.5 });
const matSleeve = new THREE.MeshStandardMaterial({ color: 0x808080, roughness: 0.45, metalness: 0.75 });
const matFlange = new THREE.MeshStandardMaterial({ color: 0xc0c0c0, roughness: 0.35, metalness: 0.8 });
const matBlade = new THREE.MeshStandardMaterial({
  color: 0xf0c674, roughness: 0.4, metalness: 0.6, side: THREE.DoubleSide
});
const matRivet = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.5, metalness: 0.9 });

function cast(geo, mat) {
  const m = new THREE.Mesh(geo, mat);
  m.castShadow = true;
  m.receiveShadow = true;
  return m;
}

// ============================================================
// HAWT layout: world Y is up, X = wind/shaft direction, Z = lateral
// ============================================================

// BASE
for (let i = 0; i < 3; i++) {
  const plate = cast(new THREE.BoxGeometry(100, 2.5, 100), matSteel);
  plate.position.y = 1.25 + i * 2.5;
  scene.add(plate);
}
const baseTop = 7.5;

// *** SOLID COLUMN 40×60×250 (replaces L-shape) ***
const column = cast(new THREE.BoxGeometry(40, 250, 60), matSolidCol);
column.position.set(0, baseTop + 125, 0);
scene.add(column);
const colTop = baseTop + 250;

// TOP CAP 40×2.5×60
const topCap = cast(new THREE.BoxGeometry(40, 2.5, 60), matSteel);
topCap.position.set(0, colTop + 1.25, 0);
scene.add(topCap);
const capTop = colTop + 2.5;

// TRAPEZOIDAL SUPPORT (2 plates, with shaft hole)
function buildTrapShape() {
  const shape = new THREE.Shape();
  shape.moveTo(-30, 0); shape.lineTo(30, 0);
  shape.lineTo(5, 45); shape.lineTo(-5, 45);
  shape.lineTo(-30, 0);
  const hole = new THREE.Path();
  hole.absarc(0, 40, 5, 0, Math.PI * 2, true);
  shape.holes.push(hole);
  return shape;
}
const trapGeo = new THREE.ExtrudeGeometry(buildTrapShape(), { depth: 2.5, bevelEnabled: false });

const W_DEPTH = 30;
const plate1 = cast(trapGeo, matTrap);
plate1.rotation.y = -Math.PI / 2;
plate1.position.set(-W_DEPTH/2, capTop, 0);
scene.add(plate1);

const plate2 = cast(trapGeo, matTrap);
plate2.rotation.y = -Math.PI / 2;
plate2.position.set(W_DEPTH/2 + 2.5, capTop, 0);
scene.add(plate2);

const trapTop = capTop + 45;
const shaftY = trapTop - 5;  // shaft passes through hole

// SHAFT along X axis
const shaftGeo = new THREE.CylinderGeometry(5, 5, 100, 24);
const shaft = cast(shaftGeo, matSteelDark);
shaft.rotation.z = Math.PI / 2;
shaft.position.set(25, shaftY, 0);
scene.add(shaft);

// ============================================================
// HUB ASSEMBLY (rotates around shaft)
// CRITICAL FIX: hubGroup is positioned at the shaft so blades rotate AROUND it
// ============================================================
const flangeX = W_DEPTH/2 + 2.5 + 20 + 2.5;  // past front plate + sleeve(20) + flange thickness midpoint
const hubGroup = new THREE.Group();
hubGroup.position.set(flangeX, shaftY, 0);  // <-- centered on the shaft, at hub
scene.add(hubGroup);

// HUB SLEEVE (∅15 × 20mm) — in front of hub group, attached to shaft
// Placed in hubGroup so it spins with everything
const sleeveGeo = new THREE.CylinderGeometry(7.5, 7.5, 20, 24);
const sleeve = cast(sleeveGeo, matSleeve);
sleeve.rotation.z = Math.PI / 2;
sleeve.position.set(-11.25, 0, 0);  // just before flange in hubGroup local frame
hubGroup.add(sleeve);

// HUB FLANGE: ∅30 × 2.5 (SMALL, replaces ∅60 disc)
const flangeR = 15;  // ∅30
const flangeGeo = new THREE.CylinderGeometry(flangeR, flangeR, 2.5, 48);
const flange = cast(flangeGeo, matFlange);
flange.rotation.z = Math.PI / 2;
flange.position.set(0, 0, 0);  // centered in hubGroup
hubGroup.add(flange);

// RIVETS (6, in 3 pairs at 120°) — visible as small caps on flange face
const rivetGeo = new THREE.CylinderGeometry(1.5, 1.5, 1.5, 12);
for (let k = 0; k < 3; k++) {
  const ang = (k * 2 * Math.PI) / 3;
  for (const r of [9, 12]) {
    const rivet = new THREE.Mesh(rivetGeo, matRivet);
    rivet.rotation.z = Math.PI / 2;
    // Position on flange front face, at radius r, angle ang
    rivet.position.set(2.0, r * Math.cos(ang), r * Math.sin(ang));
    hubGroup.add(rivet);
  }
}

// ============================================================
// BLADES: hexagon with rounded corners
// ============================================================
function buildBladeShape() {
  const shape = new THREE.Shape();
  const r = 3;  // fillet radius
  // Hexagon vertices: P0(0,0) P1(100,0) P2(100,20) P3(40,30) P4(20,10) P5(0,10)
  // With fillets at P1 (90° corner), P2 (99.5° corner), P3 (peak, ~125°)
  shape.moveTo(0, 0);
  // P0 -> P1 edge, stop r before P1
  shape.lineTo(100 - r, 0);
  // Fillet at P1 (center at 100-r, r): quarter circle
  shape.absarc(100 - r, r, r, -Math.PI/2, 0, false);
  // P1 -> P2 edge, stop r before P2
  shape.lineTo(100, 20 - r);
  // Fillet at P2: arc from (100, 20-r) to approximately (100-2.5, 20.4). 
  // For simpler approximation, use quadraticCurveTo
  shape.quadraticCurveTo(100, 20, 100 - 2.5, 20.4);
  // P2 -> P3 edge
  shape.lineTo(42.5, 29.6);
  // Fillet at P3 (peak)
  shape.quadraticCurveTo(40, 30, 38, 29);
  // P3 -> P4 edge
  shape.lineTo(20, 10);
  // P4 -> P5 (no fillet, keep concave sharp)
  shape.lineTo(0, 10);
  shape.lineTo(0, 0);
  return shape;
}
const bladeGeo = new THREE.ExtrudeGeometry(buildBladeShape(), { depth: 0.3, bevelEnabled: false });

const pitchRad = THREE.MathUtils.degToRad(20);
const hubRadius = flangeR;  // 15 (blade root at flange edge)

for (let i = 0; i < 3; i++) {
  // Arm group: rotates around shaft axis (X axis in hubGroup local frame)
  // for 120° spacing between blades
  const arm = new THREE.Group();
  arm.rotation.x = (i * 2 * Math.PI) / 3;
  hubGroup.add(arm);

  // Pitch group: applies pitch around the radial direction (Y axis in arm local frame)
  const pitchG = new THREE.Group();
  pitchG.rotation.y = pitchRad;
  arm.add(pitchG);

  // Blade mesh with quaternion to map shape axes to arm axes:
  // shape X (radial 0..100) → arm Y (further out)
  // shape Y (transverse 0..30) → arm Z (transverse, in rotation plane)
  // shape Z (thickness)        → arm X (along shaft, perpendicular to blade)
  const blade = cast(bladeGeo, matBlade);
  const q = new THREE.Quaternion();
  q.setFromAxisAngle(new THREE.Vector3(1, 1, 1).normalize(), 2 * Math.PI / 3);
  blade.quaternion.copy(q);
  // Position P0 at hub flange edge (radial = hubRadius along arm +Y)
  blade.position.y = hubRadius;
  // Small offset along arm X so blade is in front of flange face (visible)
  blade.position.x = 1.5;

  pitchG.add(blade);
}

// ============================================================
// Camera & controls
// ============================================================
const cameraTarget = new THREE.Vector3(30, 180, 0);
let camDistance = 540;
let camAzimuth = -Math.PI / 4;
let camElevation = 0.25;

function updateCamera() {
  camera.position.x = cameraTarget.x + camDistance * Math.cos(camElevation) * Math.sin(camAzimuth);
  camera.position.z = cameraTarget.z + camDistance * Math.cos(camElevation) * Math.cos(camAzimuth);
  camera.position.y = cameraTarget.y + camDistance * Math.sin(camElevation);
  camera.lookAt(cameraTarget);
}
updateCamera();

let dragging = false, lastX = 0, lastY = 0;
canvas.addEventListener('mousedown', (e) => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
});
window.addEventListener('mouseup', () => dragging = false);
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  camAzimuth -= dx * 0.008;
  camElevation += dy * 0.006;
  camElevation = Math.max(-1.3, Math.min(1.3, camElevation));
  updateCamera();
});

canvas.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1) {
    dragging = true; lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  }
}, { passive: true });
canvas.addEventListener('touchend', () => dragging = false);
canvas.addEventListener('touchmove', (e) => {
  if (!dragging || e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - lastX, dy = e.touches[0].clientY - lastY;
  lastX = e.touches[0].clientX; lastY = e.touches[0].clientY;
  camAzimuth -= dx * 0.008;
  camElevation += dy * 0.006;
  camElevation = Math.max(-1.3, Math.min(1.3, camElevation));
  updateCamera();
}, { passive: true });

canvas.addEventListener('wheel', (e) => {
  e.preventDefault();
  camDistance *= e.deltaY > 0 ? 1.08 : 0.92;
  camDistance = Math.max(120, Math.min(1400, camDistance));
  updateCamera();
}, { passive: false });

let spinning = false;
const btnSpin = document.getElementById('b-spin');
const btnReset = document.getElementById('b-reset');
btnSpin.addEventListener('click', () => {
  spinning = !spinning;
  btnSpin.textContent = spinning ? '⏸ 暂停' : '▶ 让风车转起来';
  btnSpin.classList.toggle('off', !spinning);
});
btnReset.addEventListener('click', () => {
  camDistance = 540; camAzimuth = -Math.PI / 4; camElevation = 0.25;
  updateCamera();
});

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h);
});

// Animate
function animate() {
  requestAnimationFrame(animate);
  if (spinning) {
    // Rotate the entire hubGroup around X axis (the shaft direction)
    hubGroup.rotation.x += 0.012;
  }
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
